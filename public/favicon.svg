<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a" rx="20"/>
  
  <!-- Code brackets -->
  <g stroke="#00d9ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket -->
    <path d="M 25 30 L 20 50 L 25 70"/>
    <!-- Right bracket -->
    <path d="M 75 30 L 80 50 L 75 70"/>
    <!-- Center dots (representing code) -->
    <circle cx="35" cy="40" r="2" fill="#00d9ff"/>
    <circle cx="50" cy="50" r="2" fill="#00d9ff"/>
    <circle cx="65" cy="60" r="2" fill="#00d9ff"/>
  </g>
  
  <!-- Accent line -->
  <line x1="30" y1="75" x2="70" y2="75" stroke="#00d9ff" stroke-width="2" stroke-linecap="round"/>
</svg>
